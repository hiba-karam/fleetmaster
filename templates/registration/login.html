{% extends "base.html" %}
{% block title %}FleetMaster - Connexion{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-4">
        <div class="card shadow-sm border-0 p-4">
            <h4 class="text-center text-danger fw-bold mb-4">
                <i class="bi bi-car-front-fill me-2"></i>Accès FleetMaster
            </h4>
            {% if form.errors %}
                <div class="alert alert-danger text-center py-2 mb-3 small fw-bold">
                    Identifiant ou mot de passe incorrect.
                </div>
            {% endif %}
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold">Utilisateur</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Mot de passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 mt-2">Se connecter</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
